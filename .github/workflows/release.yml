name: Release Workflow

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches: ["main"]
    paths-ignore: ["docs/**"]

  workflow_dispatch:

  release:
    types: [published]

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.26.1]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Verify Go code
        uses: ./.github/actions/go-verify
        with:
          go-version: ${{ matrix.go-version }}

  create-release:
    name: release
    runs-on: ubuntu-latest

    outputs:
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '25.8.1'

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@v5.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-binaries:
    if: needs.create-release.outputs.new_release_version != ''
    runs-on: ubuntu-latest
    needs:
      - test
      - create-release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
      - uses: wangyoucao577/go-release-action@v1.55
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_tag: v${{ needs.create-release.outputs.new_release_version }}
          ldflags: -X github.com/ci4rail/moducop-core-api-server/internal/buildinfo.Version=v${{ needs.create-release.outputs.new_release_version }}
          build_flags: -tags netgo,osusergo,static_build
          goos: linux
          goarch: arm64
          goversion: "https://go.dev/dl/go1.26.1.linux-amd64.tar.gz"
          project_path: "./cmd/api-server"
          binary_name: "core-api-server"
          extra_files: LICENSE CHANGELOG.md
      - name: Copy deployment tree
        run: >
          mkdir -p dist/deployment &&
          cp -a deploy/. dist/deployment/
      - name: Build deployment package binary
        run: >
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64
          go build
          -tags netgo,osusergo,static_build
          -ldflags "-X github.com/ci4rail/moducop-core-api-server/internal/buildinfo.Version=v${{ needs.create-release.outputs.new_release_version }}"
          -o dist/deployment/overlay-etc/upper/core-api-server
          ./cmd/api-server
      - name: Create deployment archive
        run: >
          tar -C dist/deployment -czf
          core-api-server-v${{ needs.create-release.outputs.new_release_version }}-linux-arm64-deployment.tar.gz
          .
      - name: Upload deployment archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release upload
          v${{ needs.create-release.outputs.new_release_version }}
          core-api-server-v${{ needs.create-release.outputs.new_release_version }}-linux-arm64-deployment.tar.gz
          --clobber
